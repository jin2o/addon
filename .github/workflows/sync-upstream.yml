name: Sync Upstream and Apply Optimizations
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync-and-optimize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Action Bot"
          git config user.email "action@github.com"
          git remote add upstream https://github.com/stream4me/addon.git || true
          git fetch upstream master

      - name: Save Custom Files
        run: |
          mkdir -p /tmp/custom_backup
          mkdir -p /tmp/custom_backup/channels
          cp platformcode/fallback_player.py /tmp/custom_backup/ 2>/dev/null || true
          cp platformcode/launcher.py /tmp/custom_backup/ 2>/dev/null || true
          cp platformcode/platformtools.py /tmp/custom_backup/ 2>/dev/null || true
          cp platformcode/updater.py /tmp/custom_backup/ 2>/dev/null || true
          cp platformcode/channel_utils.py /tmp/custom_backup/ 2>/dev/null || true
          cp channels/streamingcommunity.py /tmp/custom_backup/channels/ 2>/dev/null || true
          cp resources/settings.xml /tmp/custom_backup/ 2>/dev/null || true
          cp -r .github/workflows /tmp/custom_backup/ 2>/dev/null || true

      - name: Merge Upstream Changes
        run: |
          # Merge upstream prioritizing upstream changes (e.g. new channels)
          git merge upstream/master --allow-unrelated-histories --no-edit --strategy-option=theirs || true

      - name: Restore Custom Files
        run: |
          cp /tmp/custom_backup/fallback_player.py platformcode/ 2>/dev/null || true
          cp /tmp/custom_backup/launcher.py platformcode/ 2>/dev/null || true
          cp /tmp/custom_backup/platformtools.py platformcode/ 2>/dev/null || true
          cp /tmp/custom_backup/updater.py platformcode/ 2>/dev/null || true
          cp /tmp/custom_backup/channel_utils.py platformcode/ 2>/dev/null || true
          cp /tmp/custom_backup/channels/streamingcommunity.py channels/ 2>/dev/null || true
          cp /tmp/custom_backup/settings.xml resources/ 2>/dev/null || true
          mkdir -p .github/workflows
          cp -r /tmp/custom_backup/workflows/. .github/workflows/ 2>/dev/null || true

      - name: Commit and Push
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "Sync with upstream + restore jin2o customizations"
          git push origin master
